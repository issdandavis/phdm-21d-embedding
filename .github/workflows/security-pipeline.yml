name: Security Pipeline

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────
  # CodeQL Static Analysis (SAST)
  # ──────────────────────────────────────────────────
  codeql-analysis:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ──────────────────────────────────────────────────
  # Python Security Linting (Bandit)
  # ──────────────────────────────────────────────────
  bandit-scan:
    name: Python Security Lint (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r scripts/ -f json -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true

      - name: Display Bandit results
        if: always()
        run: |
          bandit -r scripts/ -f screen \
            --severity-level medium \
            --confidence-level medium || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Dependency Vulnerability Scanning
  # ──────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          if [ -f requirements-datasets.txt ]; then
            pip install -r requirements-datasets.txt
          fi
          pip-audit --format json --output pip-audit-report.json 2>&1 || true
          pip-audit --format columns 2>&1 || true

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-scan-reports
          path: pip-audit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Secret Detection (Gitleaks)
  # ──────────────────────────────────────────────────
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────
  # Filesystem Vulnerability Scan (Trivy)
  # ──────────────────────────────────────────────────
  filesystem-scan:
    name: Filesystem Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'filesystem-scan'

  # ──────────────────────────────────────────────────
  # Security Gate
  # ──────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - codeql-analysis
      - bandit-scan
      - dependency-scan
      - secret-detection
      - filesystem-scan
    if: always()

    steps:
      - name: Evaluate security gate
        run: |
          echo "=== PHDM 21D Embedding Security Pipeline Summary ==="
          echo ""
          echo "CodeQL SAST:         ${{ needs.codeql-analysis.result }}"
          echo "Bandit Scan:         ${{ needs.bandit-scan.result }}"
          echo "Dependency Scan:     ${{ needs.dependency-scan.result }}"
          echo "Secret Detection:    ${{ needs.secret-detection.result }}"
          echo "Filesystem Scan:     ${{ needs.filesystem-scan.result }}"
          echo ""

          if [ "${{ needs.secret-detection.result }}" = "failure" ]; then
            echo "CRITICAL: Secrets detected in repository!"
            exit 1
          fi

          if [ "${{ needs.codeql-analysis.result }}" = "failure" ]; then
            echo "WARNING: CodeQL found security issues. Review required."
          fi

          echo "Security gate evaluation complete."
